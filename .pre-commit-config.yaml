repos:
- repo: local
  hooks:
    - id: check-version
      name: Check if the version number has been updated in the VERSION.md file.
      entry: python ./scripts/pre-commit/check_version.py
      language: python
      always_run: true
      pass_filenames: false
      verbose: true
      additional_dependencies:
        - PyYAML
