repos:
  - repo: local
    hooks:
      - id: validate-migration-scripts
        name: Validate migration scripts
        entry: python ./scripts/pre-commit/validate_migration_scripts.py
        language: python
        always_run: true
        pass_filenames: false
        verbose: true
        additional_dependencies:
          - PyYAML
